name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Lambda functions: lambda/*.mjs files auto-deploy with name derived from filename
# Cloudflare Workers: worker/*.mjs files auto-deploy with name derived from filename

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
      worker-matrix: ${{ steps.set-matrix.outputs.worker-matrix }}
      worker-has-changes: ${{ steps.set-matrix.outputs.worker-has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v40
        with:
          files: |
            lambda/**
            worker/**
            package.json
            pnpm-lock.yaml

      - name: Set deployment matrix
        id: set-matrix
        run: |
          # Auto-detect Lambda functions from changed files in lambda/
          deploy_list=()

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == lambda/*.mjs ]]; then
              filename="$file"
              # Remove "lambda/" prefix and ".mjs" extension to get function name
              function_name=$(basename "$filename" .mjs)
              deploy_list+=("{\"filename\":\"$filename\",\"function_name\":\"$function_name\"}")
            fi
          done

          # Also deploy all lambdas if shared dependencies changed
          if echo "${{ steps.changed-files.outputs.all_changed_files }}" | grep -q "package.json\|pnpm-lock.yaml"; then
            for file in lambda/*.mjs; do
              if [ -f "$file" ]; then
                filename="$file"
                function_name=$(basename "$filename" .mjs)
                # Check if not already in deploy_list
                if ! printf '%s\n' "${deploy_list[@]}" | grep -q "\"filename\":\"$filename\""; then
                  deploy_list+=("{\"filename\":\"$filename\",\"function_name\":\"$function_name\"}")
                fi
              fi
            done
          fi

          if [ ${#deploy_list[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            matrix=$(printf '%s\n' "${deploy_list[@]}" | jq -sc .)
            echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi

          # Auto-detect Cloudflare Workers from changed files in worker/
          worker_deploy_list=()

          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == worker/*.mjs ]]; then
              filename="$file"
              # Remove "worker/" prefix and ".mjs" extension to get worker name
              worker_name=$(basename "$filename" .mjs)
              worker_deploy_list+=("{\"filename\":\"$filename\",\"worker_name\":\"$worker_name\"}")
            fi
          done

          if [ ${#worker_deploy_list[@]} -eq 0 ]; then
            echo "worker-matrix={\"include\":[]}" >> $GITHUB_OUTPUT
            echo "worker-has-changes=false" >> $GITHUB_OUTPUT
          else
            worker_matrix=$(printf '%s\n' "${worker_deploy_list[@]}" | jq -sc .)
            echo "worker-matrix={\"include\":$worker_matrix}" >> $GITHUB_OUTPUT
            echo "worker-has-changes=true" >> $GITHUB_OUTPUT
          fi

  deploy-lambda:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.has-changes == 'true'
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: "ap-southeast-2"

      - name: Create deployment package for ${{ matrix.function_name }}
        run: |
          mkdir -p dist
          cp ${{ matrix.filename }} index.mjs
          zip dist/${{ matrix.function_name }}.zip index.mjs

      - name: Deploy ${{ matrix.function_name }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ matrix.function_name }} \
            --zip-file fileb://dist/${{ matrix.function_name }}.zip

  deploy-worker:
    needs: [detect-changes]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.worker-has-changes == 'true'
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.worker-matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy ${{ matrix.worker_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy ${{ matrix.filename }} --name ${{ matrix.worker_name }} --compatibility-date $(date +%Y-%m-%d)
